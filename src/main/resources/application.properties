spring.application.name=graphql-orchestrator
server.port=8080

# ── GraphQL ────────────────────────────────────
spring.graphql.graphiql.enabled=true
spring.graphql.graphiql.path=/graphiql
spring.graphql.path=/graphql
spring.graphql.cors.allowed-origins=http://localhost:3000
spring.graphql.cors.allowed-methods=GET,POST,OPTIONS
spring.graphql.cors.allowed-headers=*
spring.graphql.cors.allow-credentials=true

# ── Eureka (service discovery — no hard-coded service URLs) ────────────────
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.instance.prefer-ip-address=true

# ── JWT (same secret as user-service to validate tokens here too) ──────────
jwt.secret=bXlzdXBlcnNlY3JldGtleW15c3VwZXJzZWNyZXRrZXk=

# ── Logging ────────────────────────────────────
logging.level.com.orchestrator=DEBUG
logging.level.org.springframework.graphql=DEBUG
